<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noticias - Care Plus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
    <div class="cp-sidebar-overlay" onclick="toggleSidebar()"></div>
    <aside class="cp-sidebar">
        <div class="sidebar-header">
            <span class="sidebar-brand-text">Care Plus</span>
            <button class="cp-hamburger" onclick="toggleSidebar()"><i class="bi bi-x-lg"></i></button>
        </div>
        <div class="sidebar-user">
            <div class="sidebar-avatar">??</div>
            <div>
                <div class="sidebar-name">Carregando...</div>
                <div class="sidebar-email"></div>
            </div>
        </div>
        <a href="index.html" class="sidebar-link"><i class="bi bi-house"></i> Inicio</a>
        <a href="agendamentos.html" class="sidebar-link"><i class="bi bi-calendar-check"></i> Agendamentos</a>
        <a href="desafios.html" class="sidebar-link"><i class="bi bi-shield-check"></i> Desafios</a>
        <a href="ranking.html" class="sidebar-link"><i class="bi bi-trophy"></i> Ranking</a>
        <a href="eventos.html" class="sidebar-link"><i class="bi bi-calendar-event"></i> Eventos</a>
        <a href="noticias.html" class="sidebar-link"><i class="bi bi-newspaper"></i> Noticias</a>
        <a href="perfil.html" class="sidebar-link"><i class="bi bi-person"></i> Perfil</a>
        <a href="notificacoes.html" class="sidebar-link"><i class="bi bi-bell"></i> Notificacoes</a>
        <a href="#" class="sidebar-link danger"><i class="bi bi-box-arrow-right"></i> Sair</a>
    </aside>
    <header class="cp-header">
        <div class="cp-header-top">
            <button class="cp-hamburger" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
            <div class="logo-text">Care Plus</div>
            <div class="header-actions">
                <button class="notification-btn" onclick="location.href='notificacoes.html'"><i class="bi bi-bell"></i><span class="notification-badge" style="display:none;">0</span></button>
            </div>
        </div>
    </header>
    <div class="cp-page-title">
        <h1><i class="bi bi-newspaper me-2"></i>Noticias</h1>
    </div>
    <div class="cp-content" id="newsContainer">
        <div class="skeleton skeleton-card"><div class="skeleton-row"><div class="skeleton-flex"><div class="skeleton skeleton-text w-60"></div><div class="skeleton skeleton-text w-80"></div><div class="skeleton skeleton-text w-40"></div></div></div></div>
        <div class="skeleton skeleton-card"><div class="skeleton-row"><div class="skeleton-flex"><div class="skeleton skeleton-text w-60"></div><div class="skeleton skeleton-text w-40"></div></div></div></div>
    </div>
    <div class="cp-empty-state" id="emptyState" style="display:none;">
        <div class="cp-empty-state-content">
            <i class="bi bi-newspaper cp-empty-state-icon"></i>
            <h3 class="cp-empty-state-title">Nenhuma noticia</h3>
            <p class="cp-empty-state-text">Nenhuma noticia publicada no momento.</p>
        </div>
    </div>
    <div id="detailView" class="cp-detail-view" style="display:none;">
        <button onclick="closeDetail()" class="cp-back-link">
            <i class="bi bi-chevron-left"></i> Voltar para noticias
        </button>
        <div id="detailContent"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/api.js"></script>
    <script src="js/noticias.js"></script>
</body>
</html>
