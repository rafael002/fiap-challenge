<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Care Plus Gamificacao</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body class="cp-auth-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-brand">
                <h1>Care Plus</h1>
                <p>Gamificacao de Saude Preventiva</p>
            </div>
            <div class="login-error" id="loginError">
                <i class="bi bi-exclamation-circle-fill"></i>
                <span>Email ou senha incorretos.</span>
            </div>
            <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
                <div class="mb-3">
                    <label class="form-label" for="email">Email</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" class="form-control" id="email" placeholder="seu@email.com" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label" for="password">Senha</label>
                    <div class="password-wrapper">
                        <input type="password" class="form-control" id="password" placeholder="Sua senha" required>
                        <button type="button" class="password-toggle" onclick="togglePassword()">
                            <i class="bi bi-eye" id="passwordIcon"></i>
                        </button>
                    </div>
                </div>
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div class="form-check login-remember">
                        <input class="form-check-input" type="checkbox" id="remember">
                        <label class="form-check-label" for="remember">Lembrar-me</label>
                    </div>
                    <a href="#" class="login-forgot">Esqueci a senha</a>
                </div>
                <button type="submit" class="btn-login" id="btnLogin">
                    Entrar
                </button>
            </form>
        </div>
        <div class="login-footer">
            Nao tem conta? <a href="cadastro.html">Cadastre-se</a>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
