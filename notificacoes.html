<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notificacoes - Care Plus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
    <div class="cp-sidebar-overlay" onclick="toggleSidebar()"></div>
    <aside class="cp-sidebar">
        <div class="sidebar-header"><span class="sidebar-brand-text">Care Plus</span><button class="cp-hamburger" onclick="toggleSidebar()"><i class="bi bi-x-lg"></i></button></div>
        <div class="sidebar-user"><div class="sidebar-avatar">RL</div><div><div class="sidebar-name">Rafael Lourenco</div><div class="sidebar-email">rafael@email.com</div></div></div>
        <a href="index.html" class="sidebar-link"><i class="bi bi-house"></i> Inicio</a>
        <a href="agendamentos.html" class="sidebar-link"><i class="bi bi-calendar-check"></i> Agendamentos</a>
        <a href="desafios.html" class="sidebar-link"><i class="bi bi-shield-check"></i> Desafios</a>
        <a href="ranking.html" class="sidebar-link"><i class="bi bi-trophy"></i> Ranking</a>
        <a href="eventos.html" class="sidebar-link"><i class="bi bi-calendar-event"></i> Eventos</a>
        <a href="noticias.html" class="sidebar-link"><i class="bi bi-newspaper"></i> Noticias</a>
        <a href="perfil.html" class="sidebar-link"><i class="bi bi-person"></i> Perfil</a>
        <a href="notificacoes.html" class="sidebar-link"><i class="bi bi-bell"></i> Notificacoes</a>
        <a href="#" class="sidebar-link danger"><i class="bi bi-box-arrow-right"></i> Sair</a>
    </aside>
    <header class="cp-header">
        <div class="cp-header-top">
            <button class="cp-hamburger" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
            <div class="logo-text">Care Plus</div>
            <div class="header-actions"><button class="notification-btn" onclick="location.href='notificacoes.html'"><i class="bi bi-bell"></i><span class="notification-badge" style="display:none;">0</span></button></div>
        </div>
    </header>
    <div class="cp-content">
        <div class="cp-section-title mb-sm">
            <span>Notificacoes</span>
            <button class="see-all mark-all-read-btn" id="markAllRead">Marcar todas como lidas</button>
        </div>
        <div id="notificationsList">
            <div class="skeleton skeleton-card"><div class="skeleton-row"><div class="skeleton skeleton-circle skeleton-circle-md"></div><div class="skeleton-flex"><div class="skeleton skeleton-text w-80"></div><div class="skeleton skeleton-text w-40"></div></div></div></div>
            <div class="skeleton skeleton-card"><div class="skeleton-row"><div class="skeleton skeleton-circle skeleton-circle-md"></div><div class="skeleton-flex"><div class="skeleton skeleton-text w-60"></div><div class="skeleton skeleton-text w-40"></div></div></div></div>
            <div class="skeleton skeleton-card"><div class="skeleton-row"><div class="skeleton skeleton-circle skeleton-circle-md"></div><div class="skeleton-flex"><div class="skeleton skeleton-text w-80"></div><div class="skeleton skeleton-text w-50"></div></div></div></div>
        </div>
        <div id="emptyState" class="cp-empty-notifications" style="display:none;">
            <i class="bi bi-bell-slash"></i>
            <p>Nenhuma notificacao por enquanto.</p>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/api.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
    <script src="js/app.js"></script>
    <script src="js/notificacoes.js"></script>
</body>
</html>
