<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Care Plus Gamificacao</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body class="cp-auth-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-brand">
                <h1>Care Plus</h1>
                <p>Crie sua conta e comece a ganhar pontos</p>
            </div>
            <div class="login-error" id="signupError">
                <i class="bi bi-exclamation-circle-fill"></i>
                <span></span>
            </div>
            <div class="login-success" id="signupSuccess">
                <i class="bi bi-check-circle-fill"></i>
                <span>Conta criada com sucesso! Redirecionando...</span>
            </div>
            <form class="login-form" id="signupForm" onsubmit="handleSignup(event)">
                <div class="mb-3">
                    <label class="form-label" for="fullName">Nome completo</label>
                    <input type="text" class="form-control" id="fullName" placeholder="Seu nome completo" required>
                </div>
                <div class="mb-3">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" class="form-control" id="email" placeholder="seu@email.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label" for="password">Senha</label>
                    <div class="password-wrapper">
                        <input type="password" class="form-control" id="password" placeholder="Minimo 6 caracteres" required minlength="6">
                        <button type="button" class="password-toggle" onclick="togglePassword()">
                            <i class="bi bi-eye" id="passwordIcon"></i>
                        </button>
                    </div>
                </div>
                <div class="row mb-3">
                    <div class="col-6">
                        <label class="form-label" for="birthDate">Data de nascimento</label>
                        <input type="date" class="form-control" id="birthDate" required>
                    </div>
                    <div class="col-6">
                        <label class="form-label" for="sex">Sexo biologico</label>
                        <select class="form-select" id="sex" required>
                            <option value="">Selecione</option>
                            <option value="MASCULINO">Masculino</option>
                            <option value="FEMININO">Feminino</option>
                        </select>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label" for="region">Regiao</label>
                    <select class="form-select" id="region">
                        <option value="">Selecione (opcional)</option>
                    </select>
                </div>
                <button type="submit" class="btn-login" id="btnSignup">
                    Criar conta
                </button>
            </form>
        </div>
        <div class="login-footer">
            Ja tem conta? <a href="login.html">Entrar</a>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/cadastro.js"></script>
</body>
</html>
